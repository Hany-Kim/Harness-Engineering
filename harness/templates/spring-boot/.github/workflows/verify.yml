name: verify-spring-boot

on:
  pull_request:
  push:
    branches: ["<default-branch>"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        # 단일 앱이면 "."로, 폴리글랏 저장소면 "backend" 같은 모듈 루트로 바꾼다.
        working-directory: "<module-dir>"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "<java-distribution>"
          java-version: "<java-version>"

      - uses: gradle/actions/setup-gradle@v4

      - name: Claude/Codex parity
        # WHY: 미러 규칙은 스택과 무관한 저장소 루트 계약이므로 루트에서 검사한다.
        working-directory: ${{ github.workspace }}
        run: bash harness/scripts/check-sync.sh

      - name: Format
        run: |
          ./gradlew spotlessApply
          git diff --exit-code

      - name: Lint and typecheck
        # AGENTS.md: ./gradlew check (spotless + checkstyle + tests)
        run: ./gradlew check

      - name: Unit tests
        run: ./gradlew test

      - name: E2E tests
        # 확인 필요: 대상 프로젝트 AGENTS.md §4에 실제 Playwright/RestAssured 명령을 적고 교체한다.
        run: "<spring-e2e-command-from-project-agents>"

      - name: Arch/layering tests
        # AGENTS.md: ArchUnit lives in src/test and runs with the unit test task.
        run: ./gradlew test
