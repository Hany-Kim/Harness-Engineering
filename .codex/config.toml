# 이 파일은 저장소가 Codex에게 요구하는 안전 경계만 담는다.
# WHY: auth/provider/account 같은 머신 로컬 설정은 사용자 환경의 소유물이며,
# 프로젝트 템플릿이 덮어쓰면 개인 인증과 조직별 정책이 섞일 수 있다.
# 따라서 이 저장소에서는 로컬 인증/프로바이더 항목을 의도적으로 정의하지 않는다.

# WHY: 기본 실행을 작업공간 쓰기 샌드박스에 가둬 저장소 밖 파일 변경과 네트워크 접근을
# 차단한다. 전역 컨벤션 §2.2의 되돌릴 수 없는 작업은 샌드박스 우회가 필요하므로
# 별도 승인 없이는 실행되지 않는다.
sandbox_mode = "workspace-write"

# WHY: 일반적인 읽기/검증 명령은 샌드박스 안에서 진행하되, 파괴적 명령·네트워크·작업공간
# 밖 쓰기가 필요하면 에이전트가 근거를 제시하고 사람 승인을 받아야 한다. `untrusted`는
# 더 강하지만 일상적인 format/lint/test까지 과도하게 멈출 수 있어, 이 하네스의 기본값은
# 작업 지속성과 보수적 승인 사이의 균형인 `on-request`로 둔다.
approval_policy = "on-request"

[sandbox_workspace_write]
# WHY: 의존성 다운로드, 배포, 원격 API 호출은 외부 상태와 비용/secret 위험을 만들 수 있다.
# 필요한 경우 매번 명시 승인으로만 열어야 한다.
network_access = false
